<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title description">
  <title id="title">A simple system diagram</title>
  <desc id="description">Input flows through a small understandable system to a clear outcome.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f1"/>
      <stop offset="1" stop-color="#ecece4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#171813" flood-opacity=".1"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="36" fill="url(#background)"/>
  <circle cx="1040" cy="100" r="180" fill="#e6532f" opacity=".09"/>
  <circle cx="160" cy="600" r="150" fill="#2f7a59" opacity=".08"/>
  <g fill="none" stroke="#8b8f86" stroke-linecap="round" stroke-width="3">
    <path d="M330 338h115"/>
    <path d="m425 320 20 18-20 18"/>
    <path d="M755 338h115"/>
    <path d="m850 320 20 18-20 18"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="110" y="258" width="220" height="160" rx="24" fill="#fff" stroke="#d6d8ce" stroke-width="2"/>
    <rect x="445" y="218" width="310" height="240" rx="28" fill="#171813"/>
    <rect x="870" y="258" width="220" height="160" rx="24" fill="#fff" stroke="#d6d8ce" stroke-width="2"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="220" y="326" fill="#8b8f86" font-size="18" font-weight="700" letter-spacing="3">INPUT</text>
    <text x="220" y="366" fill="#171813" font-size="25" font-weight="700">Clear signal</text>
    <text x="600" y="300" fill="#ff7958" font-size="18" font-weight="700" letter-spacing="3">SYSTEM</text>
    <text x="600" y="348" fill="#f7f7f1" font-size="31" font-weight="700">A few visible steps</text>
    <text x="600" y="388" fill="#a4a89e" font-size="20">Easy to inspect and change</text>
    <text x="980" y="326" fill="#8b8f86" font-size="18" font-weight="700" letter-spacing="3">OUTCOME</text>
    <text x="980" y="366" fill="#171813" font-size="25" font-weight="700">Obvious result</text>
  </g>
</svg>
