<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Article | Gus Alves</title>
    <meta name="description" content="A technical article by Gus Alves." />

    <link rel="stylesheet" href="styles.css" />

  <body>
    <div class="reading-progress" id="readingProgress" aria-hidden="true"></div>

    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="./" aria-label="Gus Alves, home">
          <span class="brand-mark" aria-hidden="true">GA<span>.</span></span>
          <span class="brand-name">Gus Alves</span>
        </a>

        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary navigation">
            <a href="./">Home</a>
            <a href="projects.html">Projects</a>
            <a href="Gus_Alves_Resume.pdf">Resume</a>
          </nav>

          <button
            class="theme-toggle"
            id="themeToggle"
            type="button"
            aria-label="Switch color theme"
            title="Switch color theme"
          >
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.5"></circle>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"></path>

            </svg>
          </button>
        </div>
      </div>
    </header>

    <main id="main-content" class="article-page">
      <div class="article-shell" id="post">
        <div class="article-loading" aria-live="polite">
          <span class="loading-dot"></span>
          Loading article...
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <p>&copy; <span data-current-year>2026</span> Gus Alves</p>
        <p>Built with plain HTML, CSS, JavaScript, and Markdown.</p>
      </div>
    </footer>
